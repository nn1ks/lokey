          export IFS=";"
          for features in $FEATURE_COMBINATIONS; do
            echo "::group::Features: \"$features\""
            cargo clippy --verbose --no-default-features --features "$features"
            echo "::endgroup::"
          done
        working-directory: examples/${{ matrix.example }}
