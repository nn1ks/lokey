name: Rust

on:
  push:
    branches: [ "master" ]
    paths-ignore:
      - docs/**
  pull_request:
    branches: [ "master" ]
    paths-ignore:
      - docs/**

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings
  DEFMT_LOG: trace

jobs:
  format:
    runs-on: ubuntu-latest
    if: always()
    steps:
      - uses: actions/checkout@v4
      - name: Print rust version
        run: |
          rustc --version
          cargo --version
      - name: Check formatting
        run: cargo fmt --verbose --check
  lokey:
    runs-on: ubuntu-latest
    if: always()
    strategy:
      fail-fast: false
      matrix:
        target: ["x86_64-unknown-linux-gnu", "thumbv7em-none-eabihf", "thumbv6m-none-eabi"]
    env:
      FEATURE_COMBINATIONS: ";macros;defmt;macros defmt"
    steps:
      - uses: actions/checkout@v4
      - name: Print rust version
        run: |
          rustc --version
          cargo --version
      - name: Build
        run: |
          export IFS=";"
          for features in $FEATURE_COMBINATIONS; do
            echo "::group::Features: \"$features\""
            cargo build -p lokey --verbose --target ${{ matrix.target }} --no-default-features --features "$features"
            echo "::endgroup::"
          done
      - name: Run clippy
        run: |
          export IFS=";"
          for features in $FEATURE_COMBINATIONS; do
            echo "::group::Features: \"$features\""
            cargo clippy -p lokey --verbose --target ${{ matrix.target }} --no-default-features --features "$features"
            echo "::endgroup::"
          done
      - name: Run tests
        if: matrix.target == 'x86_64-unknown-linux-gnu'
        run: |
          cargo test -p lokey --verbose --target ${{ matrix.target }}
